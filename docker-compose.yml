services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: saathi
      POSTGRES_USER: saathi
      POSTGRES_PASSWORD: saathi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://saathi:saathi@postgres:5432/saathi
      SAATHI_ENV: docker
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
