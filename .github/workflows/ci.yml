name: ci

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
        working-directory: backend

      - name: Train ML artifacts
        run: python scripts/train-models.py
        working-directory: backend

      - name: Run policy benchmark
        run: python app/ml/evaluation/run_benchmark.py --suite policy
        working-directory: backend

      - name: Run challenge benchmark
        run: python app/ml/evaluation/run_benchmark.py --suite challenge
        working-directory: backend

      - name: Run backend tests
        run: python -m pytest
        working-directory: backend
